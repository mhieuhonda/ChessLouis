<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hồ sơ — ChessLouis</title>
<link rel="icon" type="image/svg+xml" href="../favicon.svg">
<link rel="stylesheet" href="../css/variables.css">
<link rel="stylesheet" href="../css/reset.css">
<link rel="stylesheet" href="../css/animation.css">
<link rel="stylesheet" href="../css/button.css">
<link rel="stylesheet" href="../css/navbar.css">
<link rel="stylesheet" href="../css/main.css">
<link rel="stylesheet" href="../css/profile.css">
</head>
<body class="profile-body">

<header class="navbar">
  <div class="logo"><span class="crown">♔</span> ChessLouis</div>
  <nav class="nav-links" id="nav-links">
    <a href="play.html">Chơi cờ</a>
    <a href="ranking.html">Xếp hạng</a>
    <a href="tournament.html">Giải đấu</a>
    <a href="history.html">Lịch sử</a>
    <a href="profile.html">Hồ sơ</a>
    <a href="admin.html" class="admin-link hidden" data-admin-only>Quản trị</a>
  </nav>
  <div class="nav-right">
    <div id="nav-auth-slot"></div>
    <button class="nav-toggle" id="nav-toggle">☰</button>
  </div>
</header>

<div class="page-wrap">
  <div class="profile-card scale-in">
    <div class="avatar-wrap">
      <div id="role-ring" class="role-ring hidden"></div>
      <div id="avatar" class="avatar-lg">♟</div>
    </div>
    <h1 id="username">Đang tải...</h1>
    <div class="badge-row">
      <span id="title-badge" class="title-badge">🏵️ ...</span>
    </div>
    <p class="rank-name" id="rank-name">Đang tải danh hiệu...</p>

    <div class="info">
      <div class="stat-box"><div class="stat-label">Elo</div><div class="stat-value" id="elo">0</div></div>
      <div class="stat-box win"><div class="stat-label">Thắng</div><div class="stat-value" id="wins">0</div></div>
      <div class="stat-box loss"><div class="stat-label">Thua</div><div class="stat-value" id="losses">0</div></div>
      <div class="stat-box draw"><div class="stat-label">Hòa</div><div class="stat-value" id="draws">0</div></div>
    </div>

    <div class="profile-actions">
      <button class="btn btn-ghost" id="edit-avatar-btn">Đổi biểu tượng</button>
      <a class="btn btn-gold" href="play.html">Chơi ngay</a>
      <a class="btn btn-ghost" href="settings.html">Cài đặt</a>
    </div>
  </div>

  <h2 class="section-title">Lịch sử gần đây</h2>
  <div class="history-list" id="history-list">
    <div class="loader-ring"></div>
  </div>
  <div style="text-align:center;margin-top:14px;">
    <a href="history.html" style="color:var(--gold-soft);font-size:14px;">Xem toàn bộ lịch sử →</a>
  </div>
</div>

<!-- Chọn biểu tượng đại diện -->
<div class="result-modal hidden" id="avatar-modal">
  <div class="result-box">
    <h2 style="margin-bottom:14px;">Chọn biểu tượng</h2>
    <div id="avatar-picker" style="display:flex;flex-wrap:wrap;gap:10px;justify-content:center;max-width:260px;margin-bottom:16px;"></div>
    <button class="btn btn-ghost" id="close-avatar-modal">Đóng</button>
  </div>
</div>

<div id="toast-root"></div>
<script type="module" src="../js/app.js"></script>
<script type="module" src="../js/profile.js"></script>
</body>
</html>
