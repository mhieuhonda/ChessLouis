<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Đăng ký — ChessLouis</title>
<link rel="icon" type="image/svg+xml" href="../favicon.svg">
<link rel="stylesheet" href="../css/variables.css">
<link rel="stylesheet" href="../css/reset.css">
<link rel="stylesheet" href="../css/animation.css">
<link rel="stylesheet" href="../css/main.css">
<link rel="stylesheet" href="../css/login.css">
</head>
<body class="auth-body">

<a class="back-home" href="../index.html" title="Về trang chủ">←</a>

<div class="login-box">
  <div class="logo">♔</div>
  <h1>ChessLouis</h1>
  <h2>Tạo tài khoản kỳ thủ</h2>

  <form id="register-form">
    <div class="field">
      <label for="username">Tên người chơi</label>
      <input id="username" type="text" placeholder="Tên hiển thị của bạn" required minlength="3" autocomplete="username">
    </div>
    <div class="field">
      <label for="email">Email</label>
      <input id="email" type="email" placeholder="ban@vidu.com" required autocomplete="email">
    </div>
    <div class="field">
      <label for="password">Mật khẩu</label>
      <input id="password" type="password" placeholder="Tối thiểu 6 ký tự" required minlength="6" autocomplete="new-password">
    </div>
    <div class="field-error" id="form-error"></div>
    <button id="register-btn" type="submit">Đăng ký</button>
  </form>

  <p>Đã có tài khoản? <a href="login.html">Đăng nhập</a></p>
</div>

<div id="toast-root"></div>

<script type="module">
import { register, translateAuthError } from "../js/auth.js";
import { showSuccess, showError } from "../js/notification.js";
import { redirectIfAuthed } from "../js/router.js";

redirectIfAuthed("profile.html");

const form = document.getElementById("register-form");
const btn = document.getElementById("register-btn");

form.addEventListener("submit", async (e) => {
  e.preventDefault();
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;
  const username = document.getElementById("username").value.trim();

  btn.disabled = true;
  btn.textContent = "Đang tạo tài khoản...";

  try {
    await register(email, password, username);
    showSuccess("Đăng ký thành công! Chào mừng đến ChessLouis ♔");
    window.location.href = "profile.html";
  } catch (error) {
    const msg = translateAuthError(error);
    document.getElementById("form-error").textContent = msg;
    showError(msg);
    btn.disabled = false;
    btn.textContent = "Đăng ký";
  }
});
</script>
</body>
</html>
